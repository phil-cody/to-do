<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
  </head>
  <body>
    <header>
      <div class="container">
        <h1>JUST to DO IT</h1>
        <div class="header-action">
          <button data-btn="add-project">Add project</button>
          <button data-btn="add-task">Add task</button>
        </div>
        <p class="date"></p>
      </div>
    </header>
    <main>
      <section class="sidebar">
        <div class="container">
          <h2>Projects List</h2>
          <div class="projects"></div>
          <button class="sidebar__add-project-btn" data-btn="add-project">
            Add project
          </button>
        </div>
      </section>
      <section class="dashboard"></section>
    </main>
    <dialog class="dialog" id="new-project">
      <div class="dialog-container">
        <h2>Project info</h2>
        <button class="close-dialog" data-btn="close-dialog">
          <span class="close__line" data-btn="close-dialog"></span>
          <span class="close__line" data-btn="close-dialog"></span>
        </button>
        <form class="dialog-form" method="dialog" id="addProjectForm">
          <div class="dialog-field">
            <label for="project_title">Title:</label>
            <input
              type="text"
              name="project_title"
              id="project_title"
              placeholder="e.g., My to-do list"
              required
            />
          </div>
          <div class="dialog-field">
            <label for="project_description">Description:</label>
            <textarea
              type="text"
              name="project_description"
              id="project_description"
              placeholder="Any details about the project"
              rows="4"
              cols="50"
            ></textarea>
          </div>
          <div class="dialog-field">
            <label for="project_priority">Priority:</label>
            <input
              type="number"
              name="project_priority"
              id="project_priority"
              placeholder="1"
              min="1"
              required
            />
          </div>
          <button class="dialog-btn btn" type="submit">Save the project</button>
        </form>
      </div>
    </dialog>
    <dialog class="dialog" id="new-task">
      <div class="dialog-container">
        <h2>Task info</h2>
        <button class="close-dialog" data-btn="close-dialog">
          <span class="close__line" data-btn="close-dialog"></span>
          <span class="close__line" data-btn="close-dialog"></span>
        </button>
        <form class="dialog-form" method="dialog" id="addTaskForm">
          <div class="dialog-field">
            <label for="task_title">Title</label>
            <input
              type="text"
              name="task_title"
              id="task_title"
              placeholder="e.g., Write a to-do list"
              required
            />
          </div>
          <div class="dialog-field">
            <label for="task_description">Description</label>
            <textarea
              type="text"
              name="task_description"
              id="task_description"
              placeholder="Any details about the task"
              rows="4"
              cols="50"
            ></textarea>
          </div>
          <div class="dialog-field">
            <label for="task_due_date">Due Date</label>
            <input
              type="date"
              name="task_due_date"
              id="task_due_date"
              required
            />
          </div>
          <div class="dialog-field">
            <label for="task_status">Status</label>
            <select name="task_status" id="task_status">
              <option value="completed">Completed</option>
              <option value="in-process">In Process</option>
              <option value="pending" selected>Pending</option>
            </select>
          </div>
          <div class="dialog-field">
            <label for="task_priority">Priority</label>
            <select name="task_priority" id="task_priority">
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low" selected>Low</option>
            </select>
          </div>
          <button class="dialog-btn btn" type="submit">Save the task</button>
        </form>
      </div>
    </dialog>
    <dialog class="dialog" id="todo-full"></dialog>
  </body>
</html>
